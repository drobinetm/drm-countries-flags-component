name: Angular Release

on:
  push:
    branches:
      - main
    paths:
      - packages/angular/**
      - packages/core/**
      - .github/workflows/angular-release.yml
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag to publish
        required: false
        default: latest

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write

jobs:
  release-angular:
    name: Release Angular package
    runs-on: ubuntu-latest
    env:
      NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist-tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          provenance: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core package
        run: pnpm --filter @drobinetm/countries-flags-core build

      - name: Build Angular package
        run: pnpm --filter @drobinetm/angular-countries-flags build

      - name: Ensure version is not already published
        run: |
          VERSION=$(node -p "require('./packages/angular/package.json').version")
          if npm view "@drobinetm/angular-countries-flags@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} is already published to npm"
            exit 1
          fi

      - name: Release Angular package
        run: pnpm --filter @drobinetm/angular-countries-flags exec npm publish --access public --tag "$NPM_DIST_TAG"
