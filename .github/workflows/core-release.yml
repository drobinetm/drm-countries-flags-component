name: Core Release

on:
  push:
    branches:
      - main
    paths:
      - packages/core/package.json
      - .github/workflows/core-release.yml
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag to publish
        required: false
        default: latest

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Publish core package
    runs-on: ubuntu-latest
    env:
      PACKAGE_DIR: packages/core
      NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist-tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          provenance: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter @drobinetm/countries-flags-core build

      - name: Publish package if version is new
        shell: bash
        run: |
          set -euo pipefail
          package_name=$(npm pkg get name --prefix "$PACKAGE_DIR" | tr -d '"')
          package_version=$(npm pkg get version --prefix "$PACKAGE_DIR" | tr -d '"')

          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            printf '%s@%s already published, skipping\n' "$package_name" "$package_version"
            exit 0
          fi

          printf 'Publishing %s@%s\n' "$package_name" "$package_version"
          pnpm --filter "$package_name" publish --access public --tag "$NPM_DIST_TAG" --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
